<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Systems: Concepts & Definitions - Quiz Hub</title>
    <link rel="stylesheet" href="base.css">
    <style>
        /* Quiz-specific styles */
        .quiz-header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .quiz-details {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .detail-item {
            text-align: center;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
        }

        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        .question-container {
            background: white;
            border-radius: var(--border-radius-large);
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-medium);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .question-counter {
            background: var(--primary-gradient);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .question-type {
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* Matching Question Styles */
        .matching-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 20px;
            max-height: 600px;
            overflow: hidden;
        }

        .matching-column {
            background: #f8f9fa;
            border-radius: var(--border-radius);
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
        }

        .column-title {
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            color: var(--text-dark);
            position: sticky;
            top: 0;
            background: #f8f9fa;
            padding: 10px 0;
            z-index: 10;
        }

        .matching-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: var(--border-radius);
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .matching-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-1px);
            box-shadow: var(--shadow-light);
        }

        .matching-item.selected {
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }

        .matching-item.correct {
            border-color: #28a745;
            background: rgba(40, 167, 69, 0.1);
            cursor: default;
        }

        .matching-item.incorrect {
            border-color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
            cursor: default;
        }

        .matching-item.matched {
            opacity: 0.7;
        }

        .quiz-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 20px;
        }

        .progress-info {
            flex: 1;
            text-align: center;
        }

        .progress-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
        }

        .results-container {
            text-align: center;
            padding: 40px 20px;
        }

        .score-display {
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .results-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: var(--border-radius);
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .text-success { color: #28a745; }
        .text-danger { color: #dc3545; }
        .text-primary { color: var(--primary-color); }
        .text-muted { color: var(--text-muted); }

        @media (max-width: 768px) {
            .matching-container {
                grid-template-columns: 1fr;
                gap: 20px;
                max-height: none;
            }

            .matching-column {
                max-height: 400px;
            }

            .quiz-info {
                flex-direction: column;
                text-align: center;
            }

            .quiz-details {
                justify-content: center;
            }

            .quiz-controls {
                flex-direction: column;
                gap: 15px;
            }

            .results-stats {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

        class ControlSystemsQuiz {
            constructor(data) {
                this.data = data;
                this.currentQuestion = 0;
                this.answers = [];
                this.startTime = Date.now();
                this.matches = {};
                this.correctMatches = 0;
                
                this.init();
            }

            init() {
                // Randomize the right items (definitions) to make it more challenging
                this.data.questions[0].rightItems = Utils.shuffleArray(this.data.questions[0].rightItems);
                
                this.correctMatches = 0;
                this.startTimer();
                this.renderQuestion();
            }

            startTimer() {
                Quiz.timer.start(this.data.timeLimit, 
                    (remaining) => {
                        document.getElementById('timer').textContent = Quiz.formatTime(remaining);
                    },
                    () => {
                        this.finishQuiz();
                    }
                );
            }

            renderQuestion() {
                const question = this.data.questions[this.currentQuestion];
                const container = document.getElementById('quizContainer');

                container.innerHTML = `
                    <div class="question-container">
                        <div class="question-header">
                            <div class="question-counter">Control Systems Matching Challenge</div>
                            <div class="question-type">Match All 42 Concepts</div>
                        </div>
                        
                        <div class="question-text">${question.question}</div>
                        
                        <div class="matching-container">
                            <div class="matching-column">
                                <div class="column-title">Concepts</div>
                                ${question.leftItems.map(item => `
                                    <div class="matching-item" data-id="${item.id}" data-correct="${item.correct}">
                                        ${item.text}
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div class="matching-column">
                                <div class="column-title">Definitions</div>
                                ${question.rightItems.map(item => `
                                    <div class="matching-item" data-id="${item.id}">
                                        ${item.text}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="quiz-controls">
                            <div class="progress-info">
                                <div class="progress-text">Matched: <span id="matchedCount">0</span> / 42</div>
                                <div class="progress-bar">
                                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                                </div>
                            </div>
                            <button class="btn btn-secondary" onclick="quiz.showAnswerKey()" id="answerKeyBtn">
                                Show Answer Key
                            </button>
                            <button class="btn btn-success" onclick="quiz.finishQuiz()" id="finishBtn" style="display: none;">
                                Finish Quiz
                            </button>
                        </div>
                    </div>
                `;

                this.setupMatchingInteraction();
            }

            setupMatchingInteraction() {
                const leftItems = document.querySelectorAll('.matching-column:first-child .matching-item');
                const rightItems = document.querySelectorAll('.matching-column:last-child .matching-item');
                let selectedLeft = null;

                leftItems.forEach(item => {
                    item.addEventListener('click', () => {
                        if (item.classList.contains('correct') || item.classList.contains('incorrect')) return;
                        
                        leftItems.forEach(i => i.classList.remove('selected'));
                        item.classList.add('selected');
                        selectedLeft = item;
                    });
                });

                rightItems.forEach(item => {
                    item.addEventListener('click', () => {
                        if (!selectedLeft || item.classList.contains('correct') || item.classList.contains('incorrect')) return;
                        
                        const leftId = selectedLeft.dataset.id;
                        const rightId = item.dataset.id;
                        const correctAnswer = selectedLeft.dataset.correct;
                        
                        // Remove any existing match for this left item
                        if (this.matches[leftId]) {
                            const prevRightItem = document.querySelector(`[data-id="${this.matches[leftId]}"]`);
                            if (prevRightItem) {
                                prevRightItem.classList.remove('matched', 'selected', 'correct', 'incorrect');
                            }
                        }
                        
                        // Remove any existing match for this right item
                        for (let [key, value] of Object.entries(this.matches)) {
                            if (value === rightId) {
                                delete this.matches[key];
                                const leftItem = document.querySelector(`[data-id="${key}"]`);
                                if (leftItem) {
                                    leftItem.classList.remove('matched', 'selected', 'correct', 'incorrect');
                                }
                                break;
                            }
                        }
                        
                        this.matches[leftId] = rightId;
                        
                        selectedLeft.classList.remove('selected');
                        item.classList.remove('selected');
                        
                        // Immediately check if the match is correct
                        if (rightId === correctAnswer) {
                            selectedLeft.classList.add('correct');
                            item.classList.add('correct');
                            this.correctMatches++;
                        } else {
                            selectedLeft.classList.add('incorrect');
                            item.classList.add('incorrect');
                        }
                        
                        selectedLeft = null;
                        
                        this.updateProgress();
                        this.checkCompletion();
                    });
                });
            }

            updateProgress() {
                const matchedCount = Object.keys(this.matches).length;
                document.getElementById('matchedCount').textContent = matchedCount;
                
                const progress = (matchedCount / 42) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
            }

            checkCompletion() {
                const totalMatched = Object.keys(this.matches).length;
                if (totalMatched === 42) {
                    document.getElementById('finishBtn').style.display = 'inline-block';
                }
            }

            showAnswerKey() {
                const question = this.data.questions[this.currentQuestion];
                
                // Create a modal-like overlay for the answer key
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0,0,0,0.8);
                    z-index: 1000;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 20px;
                `;
                
                const modal = document.createElement('div');
                modal.style.cssText = `
                    background: white;
                    border-radius: 20px;
                    padding: 30px;
                    max-width: 800px;
                    max-height: 80vh;
                    overflow-y: auto;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                `;
                
                // Generate answer key content
                let answerKeyHTML = `
                    <h2 style="text-align: center; margin-bottom: 30px; color: var(--primary-color);">Answer Key</h2>
                    <div style="display: grid; gap: 15px;">
                `;
                
                question.leftItems.forEach((item, index) => {
                    const correctDefinition = question.rightItems.find(right => right.id === item.correct);
                    answerKeyHTML += `
                        <div style="border: 1px solid #e9ecef; border-radius: 10px; padding: 15px; background: #f8f9fa;">
                            <div style="font-weight: bold; color: var(--primary-color); margin-bottom: 8px;">
                                ${item.text}
                            </div>
                            <div style="color: var(--text-dark); font-size: 0.9rem;">
                                ${correctDefinition.text}
                            </div>
                        </div>
                    `;
                });
                
                answerKeyHTML += `
                    </div>
                    <div style="text-align: center; margin-top: 30px;">
                        <button onclick="this.parentElement.parentElement.parentElement.remove()" 
                                style="background: var(--primary-gradient); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer;">
                            Close Answer Key
                        </button>
                    </div>
                `;
                
                modal.innerHTML = answerKeyHTML;
                overlay.appendChild(modal);
                document.body.appendChild(overlay);
                
                // Close on overlay click
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.remove();
                    }
                });
            }

            checkAnswers() {
                // This method is no longer needed but keeping for compatibility
                console.log('Answers are checked automatically now');
            }

            finishQuiz() {
                Quiz.timer.stop();
                const timeElapsed = Quiz.timer.getElapsed();
                
                // Create answer array for compatibility
                this.answers = [{
                    questionId: 1,
                    type: 'matching',
                    matches: this.matches,
                    correct: this.correctMatches === 42,
                    score: this.correctMatches / 42
                }];
                
                const summary = {
                    total: 42,
                    correct: this.correctMatches,
                    incorrect: 42 - this.correctMatches,
                    score: Math.round((this.correctMatches / 42) * 100),
                    timeElapsed,
                    percentage: Math.round((this.correctMatches / 42) * 100),
                    passed: this.correctMatches >= 30 // 70% of 42
                };
                
                // Save results
                Storage.saveQuizResult(this.data.id, summary);
                
                this.showResults(summary);
            }

            showResults(summary) {
                document.getElementById('quizContainer').style.display = 'none';
                const resultsContainer = document.getElementById('resultsContainer');
                
                resultsContainer.innerHTML = `
                    <div class="card results-container">
                        <h2>Quiz Complete!</h2>
                        <div class="score-display">${summary.score}%</div>
                        <p class="text-${summary.passed ? 'success' : 'danger'}" style="font-size: 1.2rem; margin-bottom: 30px;">
                            ${summary.passed ? '🎉 Excellent! You have a strong understanding of control systems!' : '📚 Keep studying! Control systems concepts take practice to master.'}
                        </p>
                        
                        <div class="results-stats">
                            <div class="stat-card">
                                <span class="stat-value text-success">${summary.correct}</span>
                                <span>Correct Matches</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-danger">${summary.incorrect}</span>
                                <span>Incorrect Matches</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-primary">42</span>
                                <span>Total Concepts</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-muted">${Quiz.formatTime(summary.timeElapsed)}</span>
                                <span>Time Taken</span>
                            </div>
                        </div>
                        
                        <div style="margin-top: 40px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                            <button class="btn btn-primary" onclick="window.location.reload()">Try Again</button>
                            <button class="btn btn-secondary" onclick="Navigation.goHome()">Back to Home</button>
                        </div>
                    </div>
                `;
                
                resultsContainer.style.display = 'block';
            }
        }

        // Initialize quiz when page loads
        let quiz;
        document.addEventListener('DOMContentLoaded', () => {
            quiz = new ControlSystemsQuiz(quizData);
        });
    </script>
</body>
