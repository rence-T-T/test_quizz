            gap: 30px;

            .quiz-info {
                flex-direction: column;
                text-align: center;

            .quiz-controls {
                flex-direction: column;

                width: 100%;
                justify-content: center;

            static shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }
        }

        // UI utilities

            static showNotification(message, type = 'info', duration = 3000) {
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    padding: 15px 20px;
                    border-radius: 10px;
                    font-weight: bold;
                    z-index: 1000;
                    transition: all 0.3s ease;
                    color: white;
                    background: ${type === 'success' ? '#28a745' : type === 'error' ? '#dc3545' : '#667eea'};
                `;
                notification.textContent = message;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.remove();
                }, duration);
            }
        }

                                <div class="progress-bar">
                                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                                </div>
                            </div>
                            
                            <div class="action-controls">
                                <button class="btn btn-warning" onclick="quiz.resetCurrentQuestion()">Reset All</button>
                                <button class="btn btn-secondary" onclick="quiz.showAnswerKey()">Answer Key</button>
                                <button class="btn btn-success" onclick="quiz.finishQuiz()" id="finishBtn">Finish Quiz</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            setupMatchingInteraction() {
                const leftItems = document.querySelectorAll('.matching-column:first-child .matching-item');
                const rightItems = document.querySelectorAll('.matching-column:last-child .matching-item');
                let selectedLeft = null;

                leftItems.forEach(item => {
                    item.addEventListener('click', () => {
                        if (item.classList.contains('correct') || item.classList.contains('incorrect')) {
                            // Allow changing answers - remove color coding and allow re-matching
                            item.classList.remove('correct', 'incorrect');
                            const matchedRightId = this.matches[item.dataset.id];
                            if (matchedRightId) {
                                const rightItem = document.querySelector(`[data-id="${matchedRightId}"]`);
                                if (rightItem) {
                                    rightItem.classList.remove('correct', 'incorrect');
                                }
                                // Update correct matches count
                                if (matchedRightId === item.dataset.correct) {
                                    this.correctMatches--;
                                }
                                delete this.matches[item.dataset.id];
                                this.updateProgress();
                            }
                        }
                        
                        leftItems.forEach(i => i.classList.remove('selected'));
                        item.classList.add('selected');
                        selectedLeft = item;
                    });
                });

                rightItems.forEach(item => {
                    item.addEventListener('click', () => {
                        if (!selectedLeft) return;
                        
                        // Allow changing if already matched
                        if (item.classList.contains('correct') || item.classList.contains('incorrect')) {
                            item.classList.remove('correct', 'incorrect');
                        }
                        
                        const leftId = selectedLeft.dataset.id;
                        const rightId = item.dataset.id;
                        const correctAnswer = selectedLeft.dataset.correct;
                        
                        // Remove any existing match for this left item
                        if (this.matches[leftId]) {
                            const prevRightItem = document.querySelector(`[data-id="${this.matches[leftId]}"]`);
                            if (prevRightItem) {
                                prevRightItem.classList.remove('matched', 'selected', 'correct', 'incorrect');
                            }
                            // Update correct matches count if previous was correct
                            if (this.matches[leftId] === correctAnswer) {
                                this.correctMatches--;
                            }
                        }
                        
                        // Remove any existing match for this right item
                        for (let [key, value] of Object.entries(this.matches)) {
                            if (value === rightId) {
                                delete this.matches[key];
                                const leftItem = document.querySelector(`[data-id="${key}"]`);
                                if (leftItem) {
                                    leftItem.classList.remove('matched', 'selected', 'correct', 'incorrect');
                                    // Update correct matches count if previous was correct
                                    const prevCorrect = leftItem.dataset.correct;
                                    if (rightId === prevCorrect) {
                                        this.correctMatches--;
                                    }
                                }
                                break;
                            }
                        }
                        
                        this.matches[leftId] = rightId;
                        
                        selectedLeft.classList.remove('selected');
                        item.classList.remove('selected');
                        
                        // Immediately check if the match is correct
                        if (rightId === correctAnswer) {
                            selectedLeft.classList.add('correct');
                            item.classList.add('correct');
                            this.correctMatches++;
                        } else {
                            selectedLeft.classList.add('incorrect');
                            item.classList.add('incorrect');
                        }
                        
                        selectedLeft = null;
                        
                        this.updateProgress();
                        this.checkCompletion();
                    });
                });
            }

            updateProgress() {
                const matchedCount = Object.keys(this.matches).length;
                document.getElementById('matchedCount').textContent = matchedCount;
                
                const progress = (matchedCount / 54) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
            }

            checkCompletion() {
                if (this.correctMatches === 54) {
                    UI.showNotification('Outstanding! All 54 operating system concepts matched correctly!', 'success', 3000);
                    setTimeout(() => {
                        this.finishQuiz();
                    }, 3000);
                } else if (Object.keys(this.matches).length === 54) {
                    const accuracy = Math.round((this.correctMatches / 54) * 100);
                    UI.showNotification(`All concepts matched! Accuracy: ${accuracy}% (${this.correctMatches}/54 correct)`, 
                        accuracy >= 70 ? 'success' : 'info', 4000);
                }
            }

            resetCurrentQuestion() {
                this.matches = {};
                this.correctMatches = 0;
                const allItems = document.querySelectorAll('.matching-item');
                allItems.forEach(item => {
                    item.classList.remove('selected', 'correct', 'incorrect', 'matched');
                });
                this.updateProgress();
                UI.showNotification('All matches have been reset. Start fresh!', 'info', 2000);
            }

            showAnswerKey() {
                const question = this.data.questions[this.currentQuestion];
                
                const overlay = document.createElement('div');
                overlay.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0,0,0,0.8);
                    z-index: 1000;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 20px;
                `;
                
                const modal = document.createElement('div');
                modal.style.cssText = `
                    background: white;
                    border-radius: 20px;
                    padding: 30px;
                    max-width: 900px;
                    max-height: 80vh;
                    overflow-y: auto;
                    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                `;
                
                let answerKeyHTML = `
                    <h2 style="text-align: center; margin-bottom: 30px; color: var(--primary-color);">Operating Systems - Answer Key</h2>
                    <div style="display: grid; gap: 15px;">
                `;
                
                question.leftItems.forEach((item, index) => {
                    const correctDefinition = question.rightItems.find(right => right.id === item.correct);
                    answerKeyHTML += `
                        <div style="border: 1px solid #e9ecef; border-radius: 10px; padding: 15px; background: #f8f9fa;">
                            <div style="font-weight: bold; color: var(--primary-color); margin-bottom: 8px;">
                                ${item.text}
                            </div>
                            <div style="color: var(--text-dark); font-size: 0.9rem; line-height: 1.4;">
                                ${correctDefinition.text}
                            </div>
                        </div>
                    `;
                });
                
                answerKeyHTML += `
                    </div>
                    <div style="text-align: center; margin-top: 30px;">
                        <button onclick="this.parentElement.parentElement.parentElement.remove()" 
                                style="background: var(--primary-gradient); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer;">
                            Close Answer Key
                        </button>
                    </div>
                `;
                
                modal.innerHTML = answerKeyHTML;
                overlay.appendChild(modal);
                document.body.appendChild(overlay);
                
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.remove();
                    }
                });
            }

            finishQuiz() {
                const totalMatched = Object.keys(this.matches).length;
                const finalScore = Math.round((this.correctMatches / 54) * 100);
                
                const summary = {
                    total: 54,
                    correct: this.correctMatches,
                    incorrect: totalMatched - this.correctMatches,
                    unmatched: 54 - totalMatched,
                    score: finalScore,
                    percentage: finalScore,
                    passed: finalScore >= 70
                };
                
                this.showResults(summary);
            }

            showResults(summary) {
                document.getElementById('quizContainer').style.display = 'none';
                const resultsContainer = document.getElementById('resultsContainer');
                
                let performanceMessage = '';
                let performanceClass = '';
                
                if (summary.score >= 90) {
                    performanceMessage = '🏆 Outstanding! You have mastered operating systems concepts!';
                    performanceClass = 'success';
                } else if (summary.score >= 80) {
                    performanceMessage = '🎉 Excellent work! You have a strong grasp of OS concepts!';
                    performanceClass = 'success';
                } else if (summary.score >= 70) {
                    performanceMessage = '✅ Good job! You understand most OS concepts well.';
                    performanceClass = 'success';
                } else if (summary.score >= 60) {
                    performanceMessage = '📚 Decent effort! Review the concepts you missed.';
                    performanceClass = 'primary';
                } else {
                    performanceMessage = '📖 Keep studying! Operating systems concepts need more practice.';
                    performanceClass = 'danger';
                }
                
                resultsContainer.innerHTML = `
                    <div class="results-container">
                        <h2>Quiz Complete!</h2>
                        <div class="score-display">${summary.score}%</div>
                        <p class="text-${performanceClass}" style="font-size: 1.2rem; margin-bottom: 30px;">
                            ${performanceMessage}
                        </p>
                        
                        <div class="results-stats">
                            <div class="stat-card">
                                <span class="stat-value text-success">${summary.correct}</span>
                                <span>Correct Matches</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-danger">${summary.incorrect}</span>
                                <span>Incorrect Matches</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-muted">${summary.unmatched}</span>
                                <span>Unmatched</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-primary">${summary.total}</span>
                                <span>Total Concepts</span>
                            </div>
                        </div>
                        
                        <div style="margin-top: 40px;">
                            <h3 style="color: var(--primary-color); margin-bottom: 20px;">Performance Breakdown</h3>
                            <div style="background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 30px;">
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; text-align: center;">
                                    <div>
                                        <strong>Accuracy Rate:</strong><br>
                                        <span style="font-size: 1.5rem; color: ${summary.score >= 70 ? '#28a745' : '#dc3545'};">
                                            ${summary.score}%
                                        </span>
                                    </div>
                                    <div>
                                        <strong>Completion Rate:</strong><br>
                                        <span style="font-size: 1.5rem; color: var(--primary-color);">
                                            ${Math.round(((summary.correct + summary.incorrect) / summary.total) * 100)}%
                                        </span>
                                    </div>
                                    <div>
                                        <strong>Grade:</strong><br>
                                        <span style="font-size: 1.5rem; font-weight: bold; color: ${summary.score >= 90 ? '#28a745' : summary.score >= 80 ? '#28a745' : summary.score >= 70 ? '#ffc107' : '#dc3545'};">
                                            ${summary.score >= 90 ? 'A' : summary.score >= 80 ? 'B' : summary.score >= 70 ? 'C' : summary.score >= 60 ? 'D' : 'F'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div style="margin-top: 40px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                            <button class="btn btn-primary" onclick="window.location.reload()">Try Again</button>
                            <button class="btn btn-secondary" onclick="quiz.showAnswerKey()">Review Answer Key</button>
                            <button class="btn btn-success" onclick="Navigation.goHome()">Back to Home</button>
                        </div>
                    </div>
                `;
                
                resultsContainer.style.display = 'block';
                
                // Save results to localStorage (if available)
                try {
                    const results = {
                        quizId: 'operating-systems',
                        score: summary.score,
                        correct: summary.correct,
                        total: summary.total,
                        timestamp: new Date().toISOString()
                    };
                    localStorage.setItem('os-quiz-result', JSON.stringify(results));
                } catch (e) {
                    // localStorage not available, continue without saving
                }
            }
        }

        // Initialize quiz when page loads
        let quiz;
        document.addEventListener('DOMContentLoaded', () => {
            quiz = new OperatingSystemsQuiz(quizData);
        });
    </script>
</body>
</html>
