        // Custom Operating Systems Quiz Class extending QuizBase
        class OperatingSystemsQuiz extends QuizBase {
            constructor(data) {
                super(data);
            }

            renderQuizControls() {
                const question = this.data.questions[this.currentQuestion];
                
                if (question.type === 'matching') {
                    return `
                        <div class="quiz-controls">
                            <div class="navigation-controls">
                                <button class="btn btn-secondary" onclick="quiz.previousQuestion()" 
                                        ${this.currentQuestion === 0 ? 'disabled' : ''}>← Previous</button>
                            </div>
                            
                            <div class="progress-info">
                                <div class="progress-text" id="progressText">Question ${this.currentQuestion + 1} of ${this.data.questions.length}</div>
                                <div class="progress-bar">
                                    <div class="progress-fill" id="progressFill"></div>
                                </div>
                            </div>
                            
                            <div class="action-controls">
                                <button class="btn btn-warning" onclick="quiz.resetCurrentQuestion()">Reset All</button>
                                <button class="btn btn-secondary" onclick="quiz.showAnswerKey()">Answer Key</button>
                                <button class="btn btn-success" onclick="quiz.nextQuestion()" id="nextBtn">
                                    ${this.currentQuestion === this.data.questions.length - 1 ? 'Finish Quiz' : 'Next →'}
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    // Default controls for other question types
                    return `
                        <div class="quiz-controls">
                            <div class="navigation-controls">
                                <button class="btn btn-secondary" onclick="quiz.previousQuestion()" 
                                        ${this.currentQuestion === 0 ? 'disabled' : ''}>← Previous</button>
                            </div>
                            
                            <div class="progress-info">
                                <div class="progress-text" id="progressText">Question ${this.currentQuestion + 1} of ${this.data.questions.length}</div>
                                <div class="progress-bar">
                                    <div class="progress-fill" id="progressFill"></div>
                                </div>
                            </div>
                            
                            <div class="action-controls">
                                <button class="btn btn-warning" onclick="quiz.resetCurrentQuestion()">Reset</button>
                                <button class="btn btn-secondary" onclick="quiz.showAnswerKey()">Answer Key</button>
                                <button class="btn btn-primary" onclick="quiz.checkCurrentAnswers()">Check Answers</button>
                                <button class="btn btn-success" onclick="quiz.nextQuestion()" id="nextBtn">
                                    ${this.currentQuestion === this.data.questions.length - 1 ? 'Finish Quiz' : 'Next →'}
                                </button>
                            </div>
                        </div>
                    `;
                }
            }

            finishQuiz() {
                // Calculate final score across all questions
                let totalScore = 0;
                let totalPossible = 0;
                let correctItems = 0;
                let totalItems = 0;

                this.answers.forEach((answer, index) => {
                    if (answer) {
                        const question = this.data.questions[index];
                        if (question.type === 'matching') {
                            const correctMatches = answer.correctMatches || 0;
                            const totalMatches = question.leftItems.length;
                            totalScore += correctMatches;
                            totalPossible += totalMatches;
                            correctItems += correctMatches;
                            totalItems += totalMatches;
                        } else if (question.type === 'identification') {
                            const correct = answer.correctCount || 0;
                            const total = question.correctAnswers.length;
                            totalScore += correct;
                            totalPossible += total;
                            correctItems += correct;
                            totalItems += total;
                        }
                    }
                });

                const finalScore = totalPossible > 0 ? Math.round((totalScore / totalPossible) * 100) : 0;
                
                const summary = {
                    total: this.data.questions.length,
                    correct: correctItems,
                    incorrect: totalItems - correctItems,
                    totalItems: totalItems,
                    score: finalScore,
                    percentage: finalScore,
                    passed: finalScore >= 70
                };
                
                this.showResults(summary);
            }

            showResults(summary) {
                document.getElementById('quizContainer').style.display = 'none';
                const resultsContainer = document.getElementById('resultsContainer');
                
                let performanceMessage = '';
                let performanceClass = '';
                
                if (summary.score >= 90) {
                    performanceMessage = '🏆 Outstanding! You have mastered operating systems concepts!';
                    performanceClass = 'success';
                } else if (summary.score >= 80) {
                    performanceMessage = '🎉 Excellent work! You have a strong grasp of OS concepts!';
                    performanceClass = 'success';
                } else if (summary.score >= 70) {
                    performanceMessage = '✅ Good job! You understand most OS concepts well.';
                    performanceClass = 'success';
                } else if (summary.score >= 60) {
                    performanceMessage = '📚 Decent effort! Review the concepts you missed.';
                    performanceClass = 'primary';
                } else {
                    performanceMessage = '📖 Keep studying! Operating systems concepts need more practice.';
                    performanceClass = 'danger';
                }
                
                resultsContainer.innerHTML = `
                    <div class="results-container">
                        <h2>Quiz Complete!</h2>
                        <div class="score-display">${summary.score}%</div>
                        <p class="text-${performanceClass}" style="font-size: 1.2rem; margin-bottom: 30px;">
                            ${performanceMessage}
                        </p>
                        
                        <div class="results-stats">
                            <div class="stat-card">
                                <span class="stat-value text-success">${summary.correct}</span>
                                <span>Correct Answers</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-danger">${summary.incorrect}</span>
                                <span>Incorrect Answers</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-primary">${summary.totalItems}</span>
                                <span>Total Items</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-muted">${summary.total}</span>
                                <span>Questions Completed</span>
                            </div>
                        </div>
                        
                        <div style="margin-top: 40px;">
                            <h3 style="color: var(--primary-color); margin-bottom: 20px;">Performance Breakdown</h3>
                            <div style="background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 30px;">
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; text-align: center;">
                                    <div>
                                        <strong>Accuracy Rate:</strong><br>
                                        <span style="font-size: 1.5rem; color: ${summary.score >= 70 ? '#28a745' : '#dc3545'};">
                                            ${summary.score}%
                                        </span>
                                    </div>
                                    <div>
                                        <strong>Total Score:</strong><br>
                                        <span style="font-size: 1.5rem; color: var(--primary-color);">
                                            ${summary.correct}/${summary.totalItems}
                                        </span>
                                    </div>
                                    <div>
                                        <strong>Grade:</strong><br>
                                        <span style="font-size: 1.5rem; font-weight: bold; color: ${summary.score >= 90 ? '#28a745' : summary.score >= 80 ? '#28a745' : summary.score >= 70 ? '#ffc107' : summary.score >= 60 ? '#dc3545' : '#dc3545'};">
                                            ${summary.score >= 90 ? 'A' : summary.score >= 80 ? 'B' : summary.score >= 70 ? 'C' : summary.score >= 60 ? 'D' : 'F'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div style="margin-top: 40px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                            <button class="btn btn-primary" onclick="window.location.reload()">Try Again</button>
                            <button class="btn btn-secondary" onclick="Navigation.goHome()">Back to Home</button>
                        </div>
                    </div>
                `;
                
                resultsContainer.style.display = 'block';
                
                // Save results using Storage utility
                Storage.saveQuizResult('operating-systems', summary);
            }
