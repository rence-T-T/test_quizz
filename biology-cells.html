<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology: Cell Structure & Function - Quiz Hub</title>
    <link rel="stylesheet" href="base.css">
    <style>
        /* Quiz-specific styles */
        .quiz-header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .quiz-details {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .detail-item {
            text-align: center;
        }

        .detail-value {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
        }

        .timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        .question-container {
            background: white;
            border-radius: var(--border-radius-large);
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-medium);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .question-counter {
            background: var(--primary-gradient);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .question-type {
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* Matching Question Styles */
        .matching-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 20px;
        }

        .matching-column {
            background: #f8f9fa;
            border-radius: var(--border-radius);
            padding: 20px;
        }

        .column-title {
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            color: var(--text-dark);
        }

        .matching-item {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }

        .matching-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-light);
        }

        .matching-item.selected {
            border-color: var(--primary-color);
            background: rgba(102, 126, 234, 0.1);
        }

        .matching-item.matched {
            border-color: #28a745;
            background: rgba(40, 167, 69, 0.1);
            cursor: default;
        }

        .matching-item.incorrect {
            border-color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
        }

        /* Multiple Choice Styles */
        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: var(--border-radius);
            padding: 15px 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option:hover {
            border-color: var(--primary-color);
            background: rgba(102, 126, 234, 0.05);
        }

        .option.selected {
            border-color: var(--primary-color);
            background: rgba(102, 126, 234, 0.1);
        }

        .option.correct {
            border-color: #28a745;
            background: rgba(40, 167, 69, 0.1);
        }

        .option.incorrect {
            border-color: #dc3545;
            background: rgba(220, 53, 69, 0.1);
        }

        .option-letter {
            background: var(--primary-color);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .quiz-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            gap: 20px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
        }

        .results-container {
            text-align: center;
            padding: 40px 20px;
        }

        .score-display {
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .results-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: var(--border-radius);
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .matching-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .quiz-info {
                flex-direction: column;
                text-align: center;
            }

            .quiz-details {
                justify-content: center;
            }

            .quiz-controls {
                flex-direction: column;
                gap: 15px;
            }

            .results-stats {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <div class="nav-bar">
            <div class="nav-content">
                <a href="index.html" class="nav-brand">🎯 Quiz Hub</a>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Home</a>
                    <a href="#" class="nav-link active">Biology Quiz</a>
                </div>
            </div>
        </div>

        <!-- Quiz Header -->
        <div class="quiz-header">
            <div class="quiz-info">
                <div>
                    <h1>Biology: Cell Structure & Function</h1>
                    <p>Test your knowledge of cellular biology and organelles</p>
                </div>
                <div class="quiz-details">
                    <div class="detail-item">
                        <span class="detail-value" id="totalQuestions">10</span>
                        <span>Questions</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-value">15</span>
                        <span>Minutes</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-value timer" id="timer">15:00</span>
                        <span>Remaining</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quiz Content -->
        <div id="quizContainer">
            <!-- Questions will be loaded here -->
        </div>

        <!-- Results Container -->
        <div id="resultsContainer" style="display: none;">
            <!-- Results will be shown here -->
        </div>
    </div>

    <script src="base.js"></script>
    <script>
        // Biology Quiz Data
        const quizData = {
            id: 'biology-cells',
            title: 'Biology: Cell Structure & Function',
            timeLimit: 15, // minutes
            questions: [
                {
                    id: 1,
                    type: 'matching',
                    question: 'Match each organelle with its primary function:',
                    leftItems: [
                        { id: 'a', text: 'Mitochondria', correct: '4' },
                        { id: 'b', text: 'Nucleus', correct: '1' },
                        { id: 'c', text: 'Ribosomes', correct: '3' },
                        { id: 'd', text: 'Golgi Apparatus', correct: '2' }
                    ],
                    rightItems: [
                        { id: '1', text: 'Controls cell activities and contains DNA' },
                        { id: '2', text: 'Modifies and packages proteins' },
                        { id: '3', text: 'Synthesizes proteins' },
                        { id: '4', text: 'Produces energy (ATP) for the cell' }
                    ]
                },
                {
                    id: 2,
                    type: 'multiple-choice',
                    question: 'Which structure is responsible for maintaining cell shape and providing mechanical support?',
                    options: [
                        { id: 'a', text: 'Cell membrane', correct: false },
                        { id: 'b', text: 'Cytoskeleton', correct: true },
                        { id: 'c', text: 'Endoplasmic reticulum', correct: false },
                        { id: 'd', text: 'Vacuole', correct: false }
                    ]
                },
                // More questions would go here...
                {
                    id: 3,
                    type: 'matching',
                    question: 'Match each cellular transport method with its description:',
                    leftItems: [
                        { id: 'a', text: 'Osmosis', correct: '2' },
                        { id: 'b', text: 'Active Transport', correct: '3' },
                        { id: 'c', text: 'Diffusion', correct: '1' }
                    ],
                    rightItems: [
                        { id: '1', text: 'Movement from high to low concentration' },
                        { id: '2', text: 'Water movement through a membrane' },
                        { id: '3', text: 'Movement against concentration gradient using energy' }
                    ]
                }
            ]
        };

        class BiologyQuiz {
            constructor(data) {
                this.data = data;
                this.currentQuestion = 0;
                this.answers = [];
                this.startTime = Date.now();
                this.timeRemaining = data.timeLimit * 60 * 1000; // Convert to milliseconds
                
                this.init();
            }

            init() {
                // Randomize questions
                this.data.questions = Utils.shuffleArray(this.data.questions);
                
                // Randomize matching items
                this.data.questions.forEach(question => {
                    if (question.type === 'matching') {
                        question.rightItems = Utils.shuffleArray(question.rightItems);
                    } else if (question.type === 'multiple-choice') {
                        question.options = Utils.shuffleArray(question.options);
                    }
                });

                document.getElementById('totalQuestions').textContent = this.data.questions.length;
                this.startTimer();
                this.renderQuestion();
            }

            startTimer() {
                Quiz.timer.start(this.data.timeLimit, 
                    (remaining) => {
                        document.getElementById('timer').textContent = Quiz.formatTime(remaining);
                    },
                    () => {
                        this.finishQuiz();
                    }
                );
            }

            renderQuestion() {
                const question = this.data.questions[this.currentQuestion];
                const container = document.getElementById('quizContainer');

                if (question.type === 'matching') {
                    container.innerHTML = this.renderMatchingQuestion(question);
                    this.setupMatchingInteraction();
                } else if (question.type === 'multiple-choice') {
                    container.innerHTML = this.renderMultipleChoiceQuestion(question);
                    this.setupMultipleChoiceInteraction();
                }

                this.updateProgress();
            }

            renderMatchingQuestion(question) {
                return `
                    <div class="question-container">
                        <div class="question-header">
                            <div class="question-counter">Question ${this.currentQuestion + 1} of ${this.data.questions.length}</div>
                            <div class="question-type">Matching</div>
                        </div>
                        
                        <div class="question-text">${question.question}</div>
                        
                        <div class="matching-container">
                            <div class="matching-column">
                                <div class="column-title">Items</div>
                                ${question.leftItems.map(item => `
                                    <div class="matching-item" data-id="${item.id}" data-correct="${item.correct}">
                                        ${item.text}
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div class="matching-column">
                                <div class="column-title">Definitions</div>
                                ${question.rightItems.map(item => `
                                    <div class="matching-item" data-id="${item.id}">
                                        ${item.text}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="quiz-controls">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                            <button class="btn btn-primary" onclick="quiz.nextQuestion()" id="nextBtn" disabled>
                                ${this.currentQuestion === this.data.questions.length - 1 ? 'Finish Quiz' : 'Next Question'}
                            </button>
                        </div>
                    </div>
                `;
            }

            renderMultipleChoiceQuestion(question) {
                return `
                    <div class="question-container">
                        <div class="question-header">
                            <div class="question-counter">Question ${this.currentQuestion + 1} of ${this.data.questions.length}</div>
                            <div class="question-type">Multiple Choice</div>
                        </div>
                        
                        <div class="question-text">${question.question}</div>
                        
                        <div class="options-container">
                            ${question.options.map((option, index) => `
                                <div class="option" data-id="${option.id}" data-correct="${option.correct}">
                                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                                    <div>${option.text}</div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="quiz-controls">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                            <button class="btn btn-primary" onclick="quiz.nextQuestion()" id="nextBtn" disabled>
                                ${this.currentQuestion === this.data.questions.length - 1 ? 'Finish Quiz' : 'Next Question'}
                            </button>
                        </div>
                    </div>
                `;
            }

            setupMatchingInteraction() {
                const leftItems = document.querySelectorAll('.matching-column:first-child .matching-item');
                const rightItems = document.querySelectorAll('.matching-column:last-child .matching-item');
                let selectedLeft = null;
                let matches = {};

                leftItems.forEach(item => {
                    item.addEventListener('click', () => {
                        if (item.classList.contains('matched')) return;
                        
                        leftItems.forEach(i => i.classList.remove('selected'));
                        item.classList.add('selected');
                        selectedLeft = item;
                    });
                });

                rightItems.forEach(item => {
                    item.addEventListener('click', () => {
                        if (!selectedLeft || item.classList.contains('matched')) return;
                        
                        const leftId = selectedLeft.dataset.id;
                        const rightId = item.dataset.id;
                        const correctMatch = selectedLeft.dataset.correct;
                        
                        matches[leftId] = rightId;
                        
                        selectedLeft.classList.remove('selected');
                        selectedLeft.classList.add('matched');
                        item.classList.add('matched');
                        
                        selectedLeft = null;
                        
                        // Check if all matches are made
                        if (Object.keys(matches).length === leftItems.length) {
                            this.saveMatchingAnswer(matches);
                            document.getElementById('nextBtn').disabled = false;
                        }
                    });
                });
            }

            setupMultipleChoiceInteraction() {
                const options = document.querySelectorAll('.option');
                
                options.forEach(option => {
                    option.addEventListener('click', () => {
                        options.forEach(opt => opt.classList.remove('selected'));
                        option.classList.add('selected');
                        
                        this.saveMultipleChoiceAnswer(option.dataset.id, option.dataset.correct === 'true');
                        document.getElementById('nextBtn').disabled = false;
                    });
                });
            }

            saveMatchingAnswer(matches) {
                const question = this.data.questions[this.currentQuestion];
                let correct = 0;
                
                question.leftItems.forEach(item => {
                    if (matches[item.id] === item.correct) {
                        correct++;
                    }
                });
                
                this.answers.push({
                    questionId: question.id,
                    type: 'matching',
                    matches: matches,
                    correct: correct === question.leftItems.length,
                    score: correct / question.leftItems.length
                });
            }

            saveMultipleChoiceAnswer(selectedId, isCorrect) {
                const question = this.data.questions[this.currentQuestion];
                
                this.answers.push({
                    questionId: question.id,
                    type: 'multiple-choice',
                    selected: selectedId,
                    correct: isCorrect,
                    score: isCorrect ? 1 : 0
                });
            }

            nextQuestion() {
                if (this.currentQuestion < this.data.questions.length - 1) {
                    this.currentQuestion++;
                    this.renderQuestion();
                } else {
                    this.finishQuiz();
                }
            }

            updateProgress() {
                const progress = ((this.currentQuestion + 1) / this.data.questions.length) * 100;
                document.getElementById('progressFill').style.width = `${progress}%`;
            }

            finishQuiz() {
                Quiz.timer.stop();
                const timeElapsed = Quiz.timer.getElapsed();
                const summary = Quiz.generateSummary(this.answers, timeElapsed);
                
                // Save results
                Storage.saveQuizResult(this.data.id, summary);
                Storage.clearProgress(this.data.id);
                
                this.showResults(summary);
            }

            showResults(summary) {
                document.getElementById('quizContainer').style.display = 'none';
                const resultsContainer = document.getElementById('resultsContainer');
                
                resultsContainer.innerHTML = `
                    <div class="card results-container">
                        <h2>Quiz Complete!</h2>
                        <div class="score-display">${summary.score}%</div>
                        <p class="text-${summary.passed ? 'success' : 'danger'}" style="font-size: 1.2rem; margin-bottom: 30px;">
                            ${summary.passed ? '🎉 Congratulations! You passed!' : '📚 Keep studying and try again!'}
                        </p>
                        
                        <div class="results-stats">
                            <div class="stat-card">
                                <span class="stat-value text-success">${summary.correct}</span>
                                <span>Correct</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-danger">${summary.incorrect}</span>
                                <span>Incorrect</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-primary">${summary.total}</span>
                                <span>Total</span>
                            </div>
                            <div class="stat-card">
                                <span class="stat-value text-muted">${Quiz.formatTime(summary.timeElapsed)}</span>
                                <span>Time Taken</span>
                            </div>
                        </div>
                        
                        <div style="margin-top: 40px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                            <button class="btn btn-primary" onclick="window.location.reload()">Retake Quiz</button>
                            <button class="btn btn-secondary" onclick="Navigation.goHome()">Back to Home</button>
                        </div>
                    </div>
                `;
                
                resultsContainer.style.display = 'block';
            }
        }

        // Initialize quiz when page loads
        let quiz;
        document.addEventListener('DOMContentLoaded', () => {
            quiz = new BiologyQuiz(quizData);
        });
    </script>
</body>
</html>
