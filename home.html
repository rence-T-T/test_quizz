<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Hub - Test & Quiz Platform</title>
    <link rel="stylesheet" href="base.css">
    <style>
        /* Homepage-specific styles */
        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .stat-item {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: var(--border-radius);
            text-align: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            display: block;
        }

        .quiz-card {
            position: relative;
            cursor: pointer;
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--primary-gradient);
            border-radius: var(--border-radius-large) var(--border-radius-large) 0 0;
        }

        .quiz-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .quiz-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .quiz-description {
            color: var(--text-light);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .quiz-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .quiz-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-bar {
            max-width: 500px;
            margin: 0 auto 30px;
            position: relative;
        }

        .recent-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .recent-stats .stat {
            background: var(--background-light);
            padding: 5px 10px;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .quiz-meta {
                flex-direction: column;
                gap: 8px;
            }

            .quiz-footer {
                flex-direction: column;
                gap: 15px;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Quiz Hub</h1>
            <p>Your personalized test and quiz platform</p>
            
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-number" id="totalQuizzes">0</span>
                    <span>Total Quizzes</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="totalQuestions">0</span>
                    <span>Questions</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="recentlyAdded">0</span>
                    <span>Added This Week</span>
                </div>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" class="form-input" placeholder="🔍 Search quizzes..." id="searchInput">
        </div>

        <div class="grid grid-2" id="quizGrid">
            <!-- Quiz cards will be generated by JavaScript -->
        </div>
    </div>

    <script src="base.js"></script>
    <script>
        // Quiz data - easily expandable
        const quizzes = [
            {
                id: 'biology-cells',
                title: 'Biology: Cell Structure & Function',
                description: 'Test your knowledge of cellular biology, organelles, and basic cell processes. Includes matching questions for cell parts and functions.',
                subject: 'Biology',
                questionCount: 42,
                type: 'Matching & Multiple Choice',
                difficulty: 'Intermediate',
                dateAdded: '2025-08-02',
                dateModified: '2025-08-02',
                tags: ['Biology', 'Cells', 'Organelles', 'Matching'],
                filename: 'biology-cells.html'
            },
            {
                id: 'chemistry-periodic',
                title: 'Chemistry: Periodic Table Elements',
                description: 'Master the periodic table with element properties, atomic structure, and chemical behavior patterns.',
                subject: 'Chemistry',
                questionCount: 35,
                type: 'Matching & Fill-in-the-blank',
                difficulty: 'Advanced',
                dateAdded: '2025-08-01',
                dateModified: '2025-08-01',
                tags: ['Chemistry', 'Elements', 'Periodic Table', 'Atoms'],
                filename: 'chemistry-periodic.html'
            },
            {
                id: 'Feedback Q1',
                title: 'Feedback Q1',
                description: ' ',
                subject: ' ',
                questionCount: 42,
                type: 'Problem Solving & Matching',
                difficulty: 'Advanced',
                dateAdded: '2025-07-30',
                dateModified: '2025-07-31',
                tags: ['Physics', 'Mechanics', 'Motion', 'Forces'],
                filename: 'FeedbackQ1.html'
            },
            {
                id: 'OS Q2',
                title: 'OS Q2',
                description: ' ',
                subject: ' ',
                questionCount: 54,
                type: 'Problem Solving & Matching',
                difficulty: 'Advanced',
                dateAdded: '2025-08-12',
                dateModified: '2025-08-12',
                tags: ['Physics', 'Mechanics', 'Motion', 'Forces'],
                filename: 'OSQ2.html'
            }
        ];

        // Sort quizzes by most recent first
        quizzes.sort((a, b) => {
            const dateA = new Date(a.dateModified || a.dateAdded);
            const dateB = new Date(b.dateModified || b.dateAdded);
            return dateB - dateA;
        });

        function renderQuizzes(quizzesToRender = quizzes) {
            const quizGrid = document.getElementById('quizGrid');
            
            quizGrid.innerHTML = quizzesToRender.map(quiz => {
                const bestScore = Storage.getBestScore(quiz.id);
                const lastAttempt = Storage.getLastAttempt(quiz.id);
                
                return `
                    <div class="card quiz-card" onclick="startQuiz('${quiz.filename}')">
                        ${Utils.isRecent(quiz.dateModified || quiz.dateAdded) ? '<div class="badge">NEW</div>' : ''}
                        
                        <div class="quiz-title">${quiz.title}</div>
                        
                        <div class="quiz-meta">
                            <div class="meta-item">
                                📚 ${quiz.questionCount} questions
                            </div>
                            <div class="meta-item">
                                ⏱️ ${quiz.type}
                            </div>
                            <div class="meta-item" style="color: ${Utils.getDifficultyColor(quiz.difficulty)}">
                                🎯 ${quiz.difficulty}
                            </div>
                        </div>
                        
                        ${bestScore !== null ? `
                            <div class="recent-stats">
                                <div class="stat">Best: ${bestScore}%</div>
                                ${lastAttempt ? `<div class="stat">Last: ${lastAttempt.score}%</div>` : ''}
                            </div>
                        ` : ''}
                        
                        <div class="quiz-description">
                            ${quiz.description}
                        </div>
                        
                        <div class="quiz-tags">
                            ${quiz.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        
                        <div class="quiz-footer">
                            <div style="font-size: 0.85rem; color: var(--text-muted);">
                                Updated ${Utils.formatDate(quiz.dateModified || quiz.dateAdded)}
                            </div>
                            <button class="btn btn-primary">Start Quiz →</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const totalQuestions = quizzes.reduce((total, quiz) => total + quiz.questionCount, 0);
            const recentQuizzes = quizzes.filter(quiz => Utils.isRecent(quiz.dateModified || quiz.dateAdded)).length;
            
            document.getElementById('totalQuizzes').textContent = quizzes.length;
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('recentlyAdded').textContent = recentQuizzes;
        }

        function startQuiz(filename) {
            Navigation.goToQuiz(filename);
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            
            const debouncedSearch = Utils.debounce((searchTerm) => {
                if (searchTerm === '') {
                    renderQuizzes();
                    return;
                }
                
                const filteredQuizzes = quizzes.filter(quiz => 
                    quiz.title.toLowerCase().includes(searchTerm) ||
                    quiz.description.toLowerCase().includes(searchTerm) ||
                    quiz.subject.toLowerCase().includes(searchTerm) ||
                    quiz.tags.some(tag => tag.toLowerCase().includes(searchTerm))
                );
                
                renderQuizzes(filteredQuizzes);
            }, 300);
            
            searchInput.addEventListener('input', (e) => {
                debouncedSearch(e.target.value.toLowerCase());
            });
        }

        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            renderQuizzes();
            updateStats();
            setupSearch();
        });
    </script>
</body>
</html>
